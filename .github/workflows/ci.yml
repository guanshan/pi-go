name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Show Go version
        run: go version

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Release hygiene
        if: matrix.os == 'ubuntu-latest'
        run: ./scripts/check_release_hygiene.sh

      - name: Test
        if: matrix.os != 'windows-latest'
        run: go test -race -timeout 5m -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Test
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          go test -timeout 5m ./... 2>&1 | Tee-Object -FilePath test-output.txt
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            $tail = Get-Content test-output.txt -Tail 120 | Out-String
            $tail = $tail -replace '%', '%25' -replace "`r", '%0D' -replace "`n", '%0A'
            Write-Host "::error title=Windows go test failed::$tail"
            exit $exitCode
          }

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt
          if-no-files-found: ignore

  tidy:
    name: go mod tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify go.mod / go.sum are tidy
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' and commit the result."
            exit 1
          fi
